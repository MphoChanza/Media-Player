<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Media Player</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <h1>My Media Player</h1>

  <section>
    <h2>Featured Video</h2>
    <video width="640" controls>
      <source src="videos/sample.mp4" type="video/mp4">
      Your browser does not support the video tag.
    </video>
  </section>

<section>
  <h2>Featured Video</h2>
  <video id="myVideo" width="640">
    <source src="videos/sample.mp4" type="video/mp4">
    Your browser does not support the video tag.
  </video>
  <br>
  <button id="playVideo">Play Video</button>
  <button id="pauseVideo">Pause Video</button>
</section>

<section>
  <h2>Featured Song</h2>
  <audio id="myAudio" src="audio/song.mp3"></audio>
  <br>
  <button id="playAudio">Play Audio</button>
  <button id="pauseAudio">Pause Audio</button>
  <input type="range" id="volumeControl" min="0" max="1" step="0.1" value="0.5">
</section>

  <section>
    <h2>Featured Song</h2>
    <audio src="audio/song.mp3" controls loop></audio>
  </section>

  <footer>
    <p>© 2026 Media Player | Designed by Mpho</p>
  </footer>
  <!-- JavaScript -->
<script src="script.js"></script>
</body>
</html>
