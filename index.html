<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Media Player</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <h1>My Media Player</h1>

  <!-- Video Section -->
  <section>
    <h2>Featured Video</h2>
    <video id="myVideo" width="640" controls poster="images/cover.jpg">
      <source src="https://cdn.freecodecamp.org/curriculum/js-music-player/map-method-explained.mp4" type="video/mp4">
      Your browser does not support the video tag.
    </video>
    <br>
    <button id="playVideo">▶️ Play</button>
    <button id="pauseVideo">⏸️ Pause</button>
  </section>

  <!-- Audio Section -->
  <section>
    <h2>Featured Song</h2>
    <img src="images/thumbnail.jpg" alt="Song Thumbnail" width="200">
    <audio id="myAudio" src="https://cdn.freecodecamp.org/curriculum/js-music-player/sailing-away.mp3" controls loop></audio>
    <br>
    <button id="playAudio">▶️ Play</button>
    <button id="pauseAudio">⏸️ Pause</button>
    <input type="range" id="volumeControl" min="0" max="1" step="0.1" value="0.5">
  </section>

  <!-- YouTube Song Embed -->
  <section>
    <h2>YouTube Song</h2>
    <iframe width="560" height="315" 
      src="https://www.youtube.com/embed/yF0XdwKLnMc?list=RDyF0XdwKLnMc&start_radio=1" 
      title="YouTube Song Player" frameborder="0" 
      allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" 
      allowfullscreen>
    </iframe>
  </section>

  <!-- YouTube Comedy Video Embed -->
  <section>
    <h2>Stand-Up Comedy</h2>
    <iframe width="560" height="315" 
      src="https://www.youtube.com/embed/jxYQDfidoi8" 
      title="Ali Siddiq Stand-Up Comedy" frameborder="0" 
      allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" 
      allowfullscreen>
    </iframe>
  </section>

  <footer>
    <p>© 2026 Media Player | Designed by Mpho</p>
  </footer>

  <!-- JavaScript -->
  <script src="script.js"></script>
</body>
</html>
